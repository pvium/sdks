name: Publish Python SDK

on:
  push:
    branches:
      - main
    paths:
      - "python-sdk/**"
      - ".github/workflows/python-sdk-publish.yml"

permissions:
  contents: read
jobs:
  test:
    name: Test Python SDK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python-sdk/pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    #environment: pypi
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: python-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python-sdk/pyproject.toml

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-sdk/dist
