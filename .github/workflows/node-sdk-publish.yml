name: Publish Node SDK

on:
  push:
    branches:
      - main
    paths:
      - "node-sdk/**"
      - ".github/workflows/node-sdk-publish.yml"

permissions:
  contents: read

jobs:
  test:
    name: Test Node SDK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: node-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: node-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: node-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: node-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public
